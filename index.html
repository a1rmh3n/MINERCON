<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificación de Contrato</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px 20px; background: #f4f4f4; }
    .card { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .valido { color: #1a7f37; }
    .invalido { color: #c0392b; }
    a.boton { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #0a66c2; color: white; text-decoration: none; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card" id="resultado">Verificando contrato...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    fetch('Lista-Contratos.json')
      .then(res => res.json())
      .then(contratos => {
        const contrato = contratos.find(c => c.id === id);
        const div = document.getElementById('resultado');
        if (contrato) {
          div.innerHTML = `
            <h2 class="valido">✔ Contrato válido</h2>
            <p><b>ID:</b> ${contrato.id}</p>
            <p><b>Cliente:</b> ${contrato.cliente}</p>
            <p><b>Fecha:</b> ${contrato.fecha}</p>
            <p><b>Estado:</b> ${contrato.estado}</p>
            <a class="boton" href="${contrato.link}" target="_blank">Ver documento</a>
          `;
        } else {
          div.innerHTML = `<h2 class="invalido">✘ Contrato no encontrado</h2>`;
        }
      })
      .catch(() => {
        document.getElementById('resultado').innerHTML = "<p>Error al cargar los datos.</p>";
      });
  </script>
</body>
</html>
